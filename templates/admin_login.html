{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="login-form">
        <h2>Login Admin</h2>
 
        <form method="POST" id="adminLoginForm">
            <!-- TIDAK PERLU CSRF TOKEN UNTUK ADMIN LOGIN -->
            
            <div class="form-group">
                <label for="username">Username Admin</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Masukkan username admin" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Masukkan password admin" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-primary">Login Admin</button>
        </form>
        
        <div class="back-home">
            <a href="{{ url_for('home') }}" class="btn-secondary">Kembali ke Homepage</a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Admin login page loaded - NO CSRF REQUIRED');
});
</script>
{% endblock %}
