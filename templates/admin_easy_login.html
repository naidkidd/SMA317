<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #A0D787; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 16px; }
        h2 { color: #A0D787; text-align: center; margin-bottom: 20px; }
        .error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 Admin Panel</h2>
        <form method="POST" action="/admin-easy-login">
            <input type="text" name="username" placeholder="Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Password" required autocomplete="off">
            <button type="submit">Login</button>
        </form>
        <div class="error" id="error"></div>
    </div>
</body>
</html>
