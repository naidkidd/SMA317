{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="login-form">
        <h2>Login Siswa</h2>
 
        <form method="POST" action="{{ url_for('siswa_login_auth') }}">
            <div class="form-group">
                <label for="username">NISN (Nomor Induk Siswa Nasional)</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Masukkan NIS" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Masukkan password" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-primary">Login</button>
        </form>
         
        <div class="register-link">
            Belum punya akun? 
            <a href="{{ url_for('register') }}">Daftar di sini</a>
        </div>
        
        <div class="back-home">
            <a href="{{ url_for('home') }}" class="btn-secondary">Kembali ke Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
