<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .admin-login-form {
            background: #FFFFFF;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #A0D787;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .admin-login-form h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #A0D787;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.85rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #A0D787;
            box-shadow: 0 0 0 2px rgba(160, 215, 135, 0.2);
        }

        button {
            background: #A0D787;
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #8BC34A;
            transform: translateY(-2px);
        }

        .alert {
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-form">
            <h2>🔐 Admin Console</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="form-group">
                    <label>Username Admin</label>
                    <input type="text" name="username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required autocomplete="off">
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
