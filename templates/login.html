{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="login-form">
        <h2>Login Siswa</h2>
 
        <form method="POST" id="loginForm">
            <!-- TIDAK PERLU CSRF TOKEN UNTUK LOGIN -->
            <input type="hidden" name="role" value="siswa">
            
            <div class="form-group">
                <label for="username">NIS (Nomor Induk Siswa)</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Masukkan NIS" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Masukkan password" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-primary">Login</button>
        </form>
         
        <div class="back-home">
            <a href="{{ url_for('home') }}" class="btn-secondary">Kembali ke Homepage</a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Login page loaded - NO CSRF REQUIRED');
    
    // Simple form validation
    const form = document.getElementById('loginForm');
    if (form) {
        form.addEventListener('submit', function(e) {
            const username = this.querySelector('input[name="username"]').value;
            const password = this.querySelector('input[name="password"]').value;
            
            if (!username || !password) {
                alert('Username dan password harus diisi!');
                e.preventDefault();
                return false;
            }
            
            return true;
        });
    }
});
</script>
{% endblock %}
